<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<footer style="background:var(--ink,#1E1E1E);color:rgba(255,255,255,.78);padding:clamp(48px,7vw,80px) 0 0;font-family:'Zen Kaku Gothic New',sans-serif">
  <div style="max-width:1340px;margin:0 auto;padding:0 clamp(20px,5vw,48px)">
    <div style="display:grid;gap:clamp(28px,4vw,48px);grid-template-columns:repeat(auto-fit,minmax(min(100%,180px),1fr));padding-bottom:clamp(36px,5vw,56px)">
      <div style="grid-column:span 1;min-width:200px">
        <div style="font-family:'Klee One',cursive;font-weight:600;font-size:28px;color:#fff;margin-bottom:14px">Sakura<span style="color:var(--pink,#F48FB1)"> Store</span></div>
        <p style="font-size:14px;line-height:1.6;color:rgba(255,255,255,.6);margin:0 0 18px;max-width:280px">Figuras de anime originales y coleccionables premium. Pasión otaku, calidad japonesa.</p>
        <div style="display:flex;gap:10px">
          <sc-for list="{{ socials }}" as="s" hint-placeholder-count="4">
            <a href="#" title="{{ s.name }}" style="width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.08);display:grid;place-items:center;color:#fff;text-decoration:none;font-size:16px;transition:background .2s,transform .2s" style-hover="background:var(--pink,#F48FB1);transform:translateY(-3px)">{{ s.icon }}</a>
          </sc-for>
        </div>
      </div>
      <sc-for list="{{ columns }}" as="col" hint-placeholder-count="4">
        <div>
          <div style="font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:16px">{{ col.title }}</div>
          <div style="display:flex;flex-direction:column;gap:11px">
            <sc-for list="{{ col.links }}" as="lk" hint-placeholder-count="5">
              <a href="#" onClick="{{ lk.onClick }}" style="color:rgba(255,255,255,.72);text-decoration:none;font-size:14px;transition:color .2s" style-hover="color:var(--pink,#F48FB1)">{{ lk.label }}</a>
            </sc-for>
          </div>
        </div>
      </sc-for>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;padding:24px 0;border-top:1px solid rgba(255,255,255,.1)">
      <div style="font-size:13px;color:rgba(255,255,255,.5)">© 2026 Sakura Store · Todos los derechos reservados · <a href="#" style="color:rgba(255,255,255,.6)">Mapa del sitio</a></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <sc-for list="{{ payments }}" as="pm" hint-placeholder-count="5">
          <span style="background:rgba(255,255,255,.08);border-radius:8px;padding:6px 12px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.06em;color:rgba(255,255,255,.7)">{{ pm }}</span>
        </sc-for>
      </div>
    </div>
  </div>
</footer>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:420}}">
class Component extends DCLogic {
  renderVals(){
    const goHome = this.props.goHome || (()=>{});
    const goCat = this.props.goCat || (()=>{});
    const L = (label, fn) => ({ label, onClick: (e)=>{ if(e&&e.preventDefault)e.preventDefault(); fn(); } });
    return {
      socials: [
        {name:'Instagram',icon:'📷'},{name:'TikTok',icon:'🎵'},{name:'WhatsApp',icon:'💬'},{name:'YouTube',icon:'▶'}
      ],
      columns: [
        { title:'Categorías', links:[ L('Figuras',()=>goCat('Figuras')), L('Preventas',()=>goCat('Preventas')), L('Ofertas',()=>goCat('Ofertas')), L('Nendoroid',()=>goCat('Nendoroid')), L('Funko Pop',()=>goCat('Funko Pop')) ] },
        { title:'Ayuda', links:[ L('Cómo comprar',()=>{}), L('Envíos y entregas',()=>{}), L('Seguir mi pedido',()=>{}), L('Preguntas frecuentes',()=>{}) ] },
        { title:'Políticas', links:[ L('Términos y condiciones',()=>{}), L('Privacidad',()=>{}), L('Devoluciones',()=>{}), L('Garantía',()=>{}) ] },
        { title:'Contacto', links:[ L('hola@sakurastore.py',()=>{}), L('+595 21 000 000',()=>{}), L('Asunción, Paraguay',()=>{}), L('Lun–Sáb 9–18h',()=>{}) ] }
      ],
      payments: ['VISA','MASTERCARD','BANCARD','TIGO MONEY','EFECTIVO']
    };
  }
}
</script>
</body>
</html>
